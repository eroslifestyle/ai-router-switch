<!-- AI Router Proxy - GitHub Banner (1280x640) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <title>AI Router Proxy - Multi-Backend Router Banner</title>
  <desc>A hero banner displaying the AI Router Proxy architecture with App, Claude, and MiniMax nodes connected to a central router</desc>
  
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>
    
    <!-- Glow filters -->
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowGray" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowRouter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Arrow marker -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGradient)"/>
  
  <!-- Decorative grid pattern -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>
  
  <!-- Connection lines from App to Router -->
  <line x1="640" y1="165" x2="640" y2="210" stroke="#64748b" stroke-width="3" marker-end="url(#arrowGray)" opacity="0.8"/>
  
  <!-- Connection lines from Claude to Router -->
  <line x1="405" y1="510" x2="530" y2="320" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowBlue)" opacity="0.8"/>
  
  <!-- Connection lines from MiniMax to Router -->
  <line x1="875" y1="510" x2="750" y2="320" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrowPurple)" opacity="0.8"/>
  
  <!-- Central Router -->
  <circle cx="640" cy="320" r="110" fill="#0f1419" stroke="#3b82f6" stroke-width="4" filter="url(#glowRouter)" opacity="0.95"/>
  <circle cx="640" cy="320" r="90" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <circle cx="640" cy="320" r="70" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
  
  <!-- Router icon - network symbol -->
  <g transform="translate(640, 320)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <circle cx="-30" cy="-20" r="8" fill="#3b82f6"/>
    <circle cx="30" cy="-20" r="8" fill="#3b82f6"/>
    <circle cx="0" cy="30" r="8" fill="#3b82f6"/>
    <line x1="-22" y1="-15" x2="-8" y2="-3" stroke="#3b82f6" stroke-width="2"/>
    <line x1="22" y1="-15" x2="8" y2="-3" stroke="#3b82f6" stroke-width="2"/>
    <line x1="0" y1="22" x2="0" y2="8" stroke="#3b82f6" stroke-width="2"/>
  </g>
  
  <!-- App Node -->
  <circle cx="640" cy="100" r="65" fill="#1a202c" stroke="#64748b" stroke-width="4" filter="url(#glowGray)"/>
  <circle cx="640" cy="100" r="45" fill="none" stroke="#64748b" stroke-width="2" opacity="0.5"/>
  <!-- App icon -->
  <rect x="615" y="80" width="50" height="40" rx="6" fill="none" stroke="#64748b" stroke-width="3"/>
  <circle cx="640" cy="100" r="8" fill="#64748b"/>
  <text x="640" y="130" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">APP</text>
  
  <!-- Claude Node -->
  <circle cx="340" cy="510" r="65" fill="#1a202c" stroke="#3b82f6" stroke-width="4" filter="url(#glowBlue)"/>
  <circle cx="340" cy="510" r="45" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <!-- Claude icon - stylized brain/AI -->
  <g transform="translate(340, 495)">
    <ellipse cx="0" cy="0" rx="22" ry="18" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <path d="M-12,-5 Q-8,-12 0,-8 Q8,-12 12,-5" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="-6" cy="2" r="3" fill="#3b82f6"/>
    <circle cx="6" cy="2" r="3" fill="#3b82f6"/>
    <path d="M-8,8 Q0,12 8,8" fill="none" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <text x="340" y="565" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Claude</text>
  
  <!-- MiniMax Node -->
  <circle cx="940" cy="510" r="65" fill="#1a202c" stroke="#7c3aed" stroke-width="4" filter="url(#glowPurple)"/>
  <circle cx="940" cy="510" r="45" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
  <!-- MiniMax icon - geometric/minimax style -->
  <g transform="translate(940, 495)">
    <polygon points="0,-20 20,10 -20,10" fill="none" stroke="#7c3aed" stroke-width="3"/>
    <polygon points="0,-10 10,5 -10,5" fill="#7c3aed" opacity="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#7c3aed"/>
  </g>
  <text x="940" y="565" text-anchor="middle" fill="#7c3aed" font-family="Arial, sans-serif" font-size="18" font-weight="bold">MiniMax</text>
  
  <!-- Title -->
  <text x="640" y="265" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="80" font-weight="bold">AI Router Proxy</text>
  
  <!-- Subtitle -->
  <text x="640" y="400" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="32">Multi-Backend Router for Claude Code</text>
  
  <!-- Bottom info -->
  <text x="40" y="615" fill="#64748b" font-family="Arial, sans-serif" font-size="18">github.com/eroslifestyle/ai-router-proxy</text>
  <text x="1240" y="615" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="18">v1.0 · 2026</text>
  
  <!-- Decorative corner accents -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.3">
    <polyline points="20,20 20,60 60,60" fill="none"/>
    <polyline points="1260,20 1260,60 1220,60" fill="none"/>
    <polyline points="20,620 20,580 60,580" fill="none"/>
    <polyline points="1260,620 1260,580 1220,580" fill="none"/>
  </g>
</svg>
