<!-- AI Router Proxy - Square Logo (512x512, avatar) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img">
  <title>AI Router Proxy Logo</title>
  <desc>Square logo for AI Router Proxy showing router node connected to App, Claude and MiniMax nodes</desc>
  
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    
    <!-- Router shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="#f8fafc" rx="24"/>
  
  <!-- Connection Lines -->
  <line x1="256" y1="135" x2="256" y2="170" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-gray)"/>
  <line x1="196" y1="290" x2="156" y2="340" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <line x1="316" y1="290" x2="356" y2="340" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow-violet)"/>
  
  <!-- App Node (top) -->
  <circle cx="256" cy="90" r="45" fill="#64748b" filter="url(#shadow)"/>
  <text x="256" y="95" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">APP</text>
  
  <!-- Claude Node (bottom-left) -->
  <circle cx="140" cy="380" r="45" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="140" y="385" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Claude</text>
  
  <!-- MiniMax Node (bottom-right) -->
  <circle cx="372" cy="380" r="45" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="372" y="385" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="600">MiniMax</text>
  
  <!-- Router Central Node -->
  <circle cx="256" cy="240" r="70" fill="#1e293b" stroke="#3b82f6" stroke-width="4" filter="url(#shadow)"/>
  
  <!-- Router Switch Icon inside -->
  <g fill="#3b82f6">
    <!-- Switch base -->
    <rect x="226" y="220" width="60" height="40" rx="6" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <!-- Switch ports -->
    <circle cx="241" cy="240" r="5" fill="#3b82f6"/>
    <circle cx="256" cy="240" r="5" fill="#3b82f6"/>
    <circle cx="271" cy="240" r="5" fill="#3b82f6"/>
    <!-- Connection lines -->
    <line x1="241" y1="220" x2="241" y2="235" stroke="#3b82f6" stroke-width="2"/>
    <line x1="256" y1="220" x2="256" y2="235" stroke="#3b82f6" stroke-width="2"/>
    <line x1="271" y1="220" x2="271" y2="235" stroke="#3b82f6" stroke-width="2"/>
  </g>
  
  <!-- Text: AI Router -->
  <text x="256" y="465" text-anchor="middle" fill="#0f1419" font-family="system-ui, sans-serif" font-size="48" font-weight="700">AI Router</text>
  
  <!-- Text: Proxy -->
  <text x="256" y="498" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="22" font-weight="500">Proxy v1.0</text>
</svg>
